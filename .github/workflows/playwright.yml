name: Playwright Tests

on:
  # 🔹 Automatic trigger on push
  push:
    branches: [ main, dev ]

  # 🔹 Automatic trigger on PR
  pull_request:
    branches: [ main ]

  # 🔹 Nightly execution (12:00 AM IST)
  schedule:
    - cron: "30 18 * * *"

  # 🔹 Manual trigger with environment dropdown
  workflow_dispatch:
    inputs:
      environment:
        description: 'Select Environment'
        required: true
        default: 'qa'
        type: choice
        options:
          - dev
          - qa
          - prod

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      TEST_ENV: ${{ github.event.inputs.environment || 'qa' }}
      API_BASE_URL: ${{ secrets.API_BASE_URL }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright Tests
        run: npx playwright test

      # Generate Allure Report
      - name: Generate Allure Report
        run: npx allure generate allure-results --clean -o allure-report

      # Zip the report
      - name: Zip Allure Report
        run: zip -r allure-report.zip allure-report

      # Upload report artifact to GitHub
      - name: Upload Allure Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report

